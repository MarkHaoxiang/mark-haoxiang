services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # local development (SITE_ADDRESS unset)
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../site/dist:/srv/site:ro
      - caddy_data:/data
      - caddy_config:/config

  # settlrl-render, from a sibling checkout of settlrl-engine. Single process,
  # single worker (one in-memory game registry). Games are journalled to the
  # settlrl_state volume and replayed on restart, so a redeploy or crash resumes
  # games in progress.
  settlrl:
    build:
      context: ../../settlrl-engine
      args:
        BASE_PATH: /settlrl/
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ROOT_PATH=/settlrl
      - SETTLRL_RENDER_STATE_DIR=/data
    volumes:
      - settlrl_state:/data

volumes:
  caddy_data:
  caddy_config:
  settlrl_state:
