services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # local development (SITE_ADDRESS unset)
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../site/dist:/srv/site:ro
      - caddy_data:/data
      - caddy_config:/config

  # catan-render, from a sibling checkout of catan-engine. Single process,
  # single worker (games live in memory). CATAN_CREATE_KEY in infra/.env
  # gates game creation (the dialog's "Host key"); leave unset to allow all.
  catan:
    build:
      context: ../../catan-engine
      args:
        BASE_PATH: /catan/
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ROOT_PATH=/catan
      - CATAN_RENDER_CREATE_KEY=${CATAN_CREATE_KEY:-}

volumes:
  caddy_data:
  caddy_config:
