services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # local development (SITE_ADDRESS unset)
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../site/dist:/srv/site:ro
      - caddy_data:/data
      - caddy_config:/config

  # catan-render, from a sibling checkout of catan-engine. Single process,
  # single worker (one in-memory game registry). Games are journalled to the
  # catan_state volume and replayed on restart, so a redeploy or crash resumes
  # games in progress. CATAN_CREATE_KEY in infra/.env gates game creation (the
  # dialog's "Host key"); leave it unset to let anyone create games.
  catan:
    build:
      context: ../../catan-engine
      args:
        BASE_PATH: /catan/
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ROOT_PATH=/catan
      - CATAN_RENDER_CREATE_KEY=${CATAN_CREATE_KEY:-}
      - CATAN_RENDER_STATE_DIR=/data
    volumes:
      - catan_state:/data

volumes:
  caddy_data:
  caddy_config:
  catan_state:
