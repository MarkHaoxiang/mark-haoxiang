services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # local development (SITE_ADDRESS unset)
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../site/dist:/srv/site:ro
      - caddy_data:/data
      - caddy_config:/config

  # Future projects join as additional services, e.g.:
  #
  # catan:
  #   build: <path or image for catan-render>
  #   expose:
  #     - "8000"

volumes:
  caddy_data:
  caddy_config:
