<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="Hao Xiang Li — research, publications, and projects."
    />
    <title>Hao Xiang Li</title>
    <script>
      // Apply a stored theme choice before first paint to avoid flashing.
      try {
        var theme = localStorage.getItem("theme");
        if (theme === "light" || theme === "dark") {
          document.documentElement.dataset.theme = theme;
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
